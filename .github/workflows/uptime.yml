name: Uptime Keep-Alive

on:
  schedule:
    # Run every 10 minutes to keep the Render container warm and prevent cold starts
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "Error: BACKEND_URL secret is not configured in GitHub repository secrets."
            exit 1
          fi
          # Trim trailing slash if present
          CLEAN_URL=$(echo "$BACKEND_URL" | sed 's/\/$//')
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$CLEAN_URL/health")
          echo "Pinged $CLEAN_URL/health - Status Code: $STATUS_CODE"
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Warning: Health check returned non-200 status code: $STATUS_CODE"
            exit 1
          fi
